// --- Engine Execution Configurations ---
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

const V_WIDTH = 800;
const V_HEIGHT = 450; 
let activeWidth = 2400;

const camera = { x: 0, y: 0 };

function resizeCanvas() {
    const windowWidth = window.innerWidth;
    const windowHeight = window.innerHeight;
    let w = windowWidth, h = windowWidth * (V_HEIGHT / V_WIDTH);
    if (h > windowHeight) { h = windowHeight; w = windowHeight * (V_WIDTH / V_HEIGHT); }
    canvas.width = w; canvas.height = h;
    ctx.imageSmoothingEnabled = false;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

let currentLevel = 1;

// --- Assets Handling ---
const sprites = { idle1: new Image(), idle2: new Image(), move1: new Image(), move2: new Image() };
sprites.idle1.src = "idle1.png"; sprites.idle2.src = "idle2.png"; sprites.move1.src = "move1.png"; sprites.move2.src = "move2.png";

let loadedSprites = { idle1: false, idle2: false, move1: false, move2: false };
Object.keys(sprites).forEach(key => { sprites[key].onload = () => { loadedSprites[key] = true; }; });

// --- Player Object (With OvO Physics Moves) ---
const player = {
    x: 100, y: 300, baseWidth: 36, baseHeight: 36, width: 36, height: 36, vx: 0, vy: 0,
    accel: 0.6, maxSpeed: 6.5, friction: 0.82, jumpForce: 12.5,
    grounded: false, facingLeft: false, isSliding: false, isDiving: false, slideTimer: 0,
    animFrame: 0, animTimer: 0,
    
    resetPosition(sx = 100, sy = 300) {
        this.x = sx; this.y = sy; this.vx = 0; this.vy = 0;
        this.isSliding = false; this.isDiving = false; this.height = this.baseHeight;
    },
    updateAnimation() {
        this.animTimer++;
        if (this.animTimer > 6) { this.animFrame = this.animFrame === 0 ? 1 : 0; this.animTimer = 0; }
    },
    draw() {
        ctx.save();
        let drawX = Math.floor(this.x), drawY = Math.floor(this.y);
        if (this.facingLeft) { ctx.translate(drawX + this.width, drawY); ctx.scale(-1, 1); } 
        else { ctx.translate(drawX, drawY); }

        let currentSpriteImg = null;
        const isMoving = Math.abs(this.vx) > 0.2;
        const spriteKey = isMoving && this.grounded ? (this.animFrame === 0 ? 'move1' : 'move2') : (this.animFrame === 0 ? 'idle1' : 'idle2');
        if (isMoving && this.grounded) { currentSpriteImg = this.animFrame === 0 ? sprites.move1 : sprites.move2; } 
        else { currentSpriteImg = this.animFrame === 0 ? sprites.idle1 : sprites.idle2; }

        if (this.isSliding) { ctx.scale(1.2, 0.5); ctx.translate(0, -this.baseHeight * 0.4); } 
        else if (this.isDiving) { ctx.scale(0.7, 1.3); ctx.translate(0, -this.baseHeight * 0.1); }

        if (!loadedSprites[spriteKey]) {
            ctx.fillStyle = "#1e293b"; ctx.beginPath(); ctx.arc(this.baseWidth / 2, this.baseHeight / 2, this.baseWidth / 2, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = "#fff"; ctx.fillRect(this.baseWidth * 0.55, this.baseHeight * 0.35, 4, 6); ctx.fillRect(this.baseWidth * 0.75, this.baseHeight * 0.35, 4, 6);
        } else {
            ctx.drawImage(currentSpriteImg, 0, 0, this.baseWidth, this.baseHeight);
        }
        ctx.restore();
    }
};

// --- Level Loading Core ---
let platforms = [];
let spikes = [];
let goal = { x: 2300, y: 350, width: 35, height: 60 };

function loadJsonLevel(levelNum) {
    const data = LEVEL_DATA[levelNum - 1];
    activeWidth = data.width;
    platforms = data.platforms.map(p => ({ x: p.x, y: p.y, width: p.w, height: p.h }));
    spikes = data.spikes.map(s => ({ x: s.x, y: s.y, width: s.w, height: s.h }));
    goal = { x: data.goal.x, y: data.goal.y, width: data.goal.w, height: data.goal.h };
    player.resetPosition(data.startX, data.startY);
}

// --- Input Bindings ---
const keys = {};
window.addEventListener("keydown", e => { keys[e.code] = true; });
window.addEventListener("keyup", e => { keys[e.code] = false; });

function checkCollision(rect1, rect2) {
    return rect1.x < rect2.x + rect2.width && rect1.x + rect1.width > rect2.x && rect1.y < rect2.y + rect2.height && rect1.y + rect1.height > rect2.y;
}

// --- Game Engine Physics ---
function update() {
    if (keys["ArrowLeft"] || keys["KeyA"]) {
        if (!player.isSliding) { player.vx -= player.accel; if (player.vx < -player.maxSpeed) player.vx = -player.maxSpeed; }
        player.facingLeft = true;
    } else if (keys["ArrowRight"] || keys["KeyD"]) {
        if (!player.isSliding) { player.vx += player.accel; if (player.vx > player.maxSpeed) player.vx = player.maxSpeed; }
        player.facingLeft = false;
    } else {
        if (!player.isSliding) player.vx *= player.friction;
    }

    const downPressed = keys["ArrowDown"] || keys["KeyS"];
    if (downPressed) {
        if (player.grounded && !player.isSliding && Math.abs(player.vx) > 2) {
            player.isSliding = true; player.slideTimer = 25; player.vx *= 1.4; player.height = player.baseHeight * 0.5;
        } else if (!player.grounded && !player.isDiving) {
            player.isDiving = true; player.vy = 14; player.vx *= 1.1;
        }
    }

    if (player.isSliding) {
        player.slideTimer--; player.vx *= 0.96;
        if (player.slideTimer <= 0 || Math.abs(player.vx) < 1.5) { player.isSliding = false; player.height = player.baseHeight; }
    }

    if (keys["Space"] || keys["ArrowUp"] || keys["KeyW"]) {
        if (player.grounded) {
            if (player.isSliding) { player.vy = -player.jumpForce * 0.9; player.vx *= 1.35; player.isSliding = false; player.height = player.baseHeight; } 
            else { player.vy = -player.jumpForce; }
            player.grounded = false;
        }
    }

    player.vy += 0.6; player.x += player.vx; player.y += player.vy;

    if (player.x < 0) player.x = 0;
    if (player.x + player.width > activeWidth) player.x = activeWidth - player.width;

    player.grounded = false;

    platforms.forEach(plat => {
        if (checkCollision(player, plat)) {
            if (player.vy > 0 && (player.y + player.height - player.vy) <= plat.y) {
                player.y = plat.y - player.height; player.vy = 0; player.grounded = true;
                if (player.isDiving) { player.isDiving = false; player.isSliding = true; player.slideTimer = 20; player.vx = player.facingLeft ? -player.maxSpeed * 1.5 : player.maxSpeed * 1.5; player.height = player.baseHeight * 0.5; }
            }
            else if (player.vy < 0 && (player.y - player.vy) >= plat.y + plat.height) { player.y = plat.y + plat.height; player.vy = 0; }
            else {
                if (player.vx > 0) { player.x = plat.x - player.width; player.vx = 0; } 
                else if (player.vx < 0) { player.x = plat.x + plat.width; player.vx = 0; }
            }
        }
    });

    spikes.forEach(spike => {
        let hitBox = { x: spike.x + 3, y: spike.y + 4, width: spike.width - 6, height: spike.height - 4 };
        if (checkCollision(player, hitBox)) loadJsonLevel(currentLevel);
    });

    if (checkCollision(player, goal)) {
        currentLevel = currentLevel < 100 ? currentLevel + 1 : 1;
        loadJsonLevel(currentLevel);
    }

    camera.x = player.x - V_WIDTH / 2 + player.width / 2;
    if (camera.x < 0) camera.x = 0;
    if (camera.x > activeWidth - V_WIDTH) camera.x = activeWidth - V_WIDTH;

    player.updateAnimation();
}

// --- Render Matrix ---
function draw() {
    ctx.save();
    const currentScale = canvas.width / V_WIDTH;
    ctx.scale(currentScale, currentScale);

    ctx.fillStyle = "#bae6fd"; ctx.fillRect(0, 0, V_WIDTH, V_HEIGHT);
    ctx.translate(-Math.floor(camera.x), -Math.floor(camera.y));

    ctx.fillStyle = "#ffffff";
    platforms.forEach(plat => { ctx.fillRect(plat.x, plat.y, plat.width, plat.height); });

    ctx.fillStyle = "#475569";
    spikes.forEach(spike => {
        ctx.beginPath(); ctx.moveTo(spike.x, spike.y + spike.height); ctx.lineTo(spike.x + (spike.width / 2), spike.y); ctx.lineTo(spike.x + spike.width, spike.y + spike.height); ctx.closePath(); ctx.fill();
    });

    ctx.fillStyle = "#475569"; ctx.fillRect(goal.x, goal.y, 4, goal.height);
    ctx.fillStyle = "#ffffff"; ctx.beginPath(); ctx.moveTo(goal.x + 4, goal.y); ctx.lineTo(goal.x + goal.width, goal.y + 15); ctx.lineTo(goal.x + 4, goal.y + 30); ctx.closePath(); ctx.fill();

    player.draw();
    ctx.restore();

    ctx.save();
    ctx.scale(currentScale, currentScale);
    ctx.fillStyle = "#475569"; ctx.font = "bold 15px sans-serif"; ctx.fillText("LEVEL " + currentLevel, 25, 35);
    ctx.restore();
}

function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); }

loadJsonLevel(currentLevel);
gameLoop();
</script>
